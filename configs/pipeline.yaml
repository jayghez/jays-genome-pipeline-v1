normalize:
  reference_fasta: null
  split_multiallelics: true

resources:
  clinvar_table: configs/clinvar_stub.csv
  gnomad_table: configs/gnomad_stub.csv

filters:
  min_qual: 20
  require_pass_filter: true
  include_unknown_af: true
  default_rare_af: 0.01

annotation:
  backend: auto
  sample_index: 0
  max_records: null
  preview_limit: 200
  top_variant_limit: 100
  candidate_output_limit: 500
  snpeff_dir: resources/snpEff
  snpeff_genome: GRCh38.p13
  snpeff_memory_gb: 8

ai:
  enabled: false
